<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WebSurface · 会话管理器</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- 顶栏 -->
    <header class="topbar">
      <button id="btn-toggle-sidebar" class="icon-btn" title="菜单" aria-label="菜单">☰</button>
      <span class="brand">WebSurface</span>
      <span id="topbar-task" class="topbar-task"></span>
    </header>

    <!-- 侧边栏遮罩（移动端抽屉） -->
    <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <span>项目</span>
        <button id="btn-new-project" class="mini-btn" title="新建项目">+ 项目</button>
      </div>
      <div id="tree" class="tree"><div class="empty-hint">还没有项目，点“+ 项目”新建</div></div>
    </aside>

    <!-- 主区域 -->
    <main class="main">
      <div id="terminal-host" class="terminal-host">
        <div id="welcome" class="welcome">
          <h1>选择左侧任务以打开终端</h1>
          <p>每个任务包含终端和独立输入区，会话在关闭页面后仍由服务器保持。</p>
        </div>
        <!-- 每个任务的 xterm 与输入区会插入这里 -->
      </div>
    </main>
  </div>

  <!-- 通用模态框 -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true">
      <h2 id="modal-title">标题</h2>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn">取消</button>
        <button id="modal-ok" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/xterm-addon-fit.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/terminal.js"></script>
</body>
</html>
